[project]
name = "ralph-cli"
version = "0.1.0"
description = "Lightweight agentic loop harness for autonomous AI-driven development."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "textual>=3.0.0",
    "rich>=13.0.0",
    "click>=8.0.0",
]

[project.scripts]
ralph = "ralph.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.6.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ralph"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["ralph"]
mypy_path = "src"
